<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASO Metadata Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-start: #667eea;
      --purple-end:   #764ba2;
      --bg:      #f0f2f5;
      --surface: #ffffff;
      --border:  #e5e7eb;
      --text:    #111827;
      --muted:   #6b7280;
      --ok:      #10b981;
      --warn:    #f59e0b;
      --danger:  #ef4444;
      --radius:  12px;
      --shadow:  0 2px 10px rgba(0,0,0,0.08);
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

    .header { background: linear-gradient(135deg, var(--purple-start), var(--purple-end)); color: #fff; padding: 26px 32px; }
    .header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.3px; }
    .header p  { margin-top: 4px; opacity: 0.85; font-size: 0.875rem; }

    .main { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }
    .grid { display: grid; grid-template-columns: 340px 1fr; gap: 22px; align-items: start; }
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }

    .card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .card-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; padding-bottom: 14px; border-bottom: 2px solid var(--bg); }
    .card-title  { font-size: 0.9rem; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 6px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 5px; }
    .form-control { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.875rem; color: var(--text); background: #fafafa; font-family: inherit; transition: border-color 0.15s, box-shadow 0.15s, background 0.15s; }
    .form-control:focus { outline: none; border-color: var(--purple-start); background: #fff; box-shadow: 0 0 0 3px rgba(102,126,234,0.12); }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 110px; line-height: 1.55; }

    .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--purple-start), var(--purple-end)); color: #fff; border: none; border-radius: 9px; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s; margin-top: 4px; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(102,126,234,0.4); }
    .btn-primary:active:not(:disabled) { transform: none; }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .spin { width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { background: #fef2f2; border: 1.5px solid #fecaca; border-radius: 8px; padding: 10px 13px; color: #dc2626; font-size: 0.8rem; line-height: 1.45; margin-top: 12px; display: none; }

    .variant-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab { padding: 5px 14px; border: 1.5px solid var(--border); border-radius: 20px; background: #fff; font-size: 0.78rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .tab:hover { border-color: var(--purple-start); color: var(--purple-start); }
    .tab.active { background: var(--purple-start); border-color: var(--purple-start); color: #fff; }

    .platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .platform-grid { grid-template-columns: 1fr; } }

    .platform-panel { border: 1.5px solid var(--border); border-radius: 10px; padding: 16px; background: #fafbfc; }
    .platform-header { display: flex; align-items: center; gap: 7px; font-size: 0.84rem; font-weight: 600; color: #374151; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

    .field { margin-bottom: 13px; }
    .field:last-child { margin-bottom: 0; }
    .field-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .field-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; }

    .copy-btn { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; background: #fff; border: 1px solid var(--border); border-radius: 5px; font-size: 0.68rem; font-weight: 500; color: #9ca3af; cursor: pointer; transition: all 0.15s; }
    .copy-btn:hover { border-color: var(--purple-start); color: var(--purple-start); }
    .copy-btn.copied { border-color: var(--ok); color: var(--ok); }

    .field-input { width: 100%; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 0.85rem; font-family: inherit; color: var(--text); background: #fff; transition: border-color 0.15s; resize: none; }
    .field-input:focus { outline: none; border-color: var(--purple-start); }
    .field-input.over { border-color: var(--danger); background: #fff8f8; }

    .count-row { display: flex; align-items: center; gap: 7px; margin-top: 4px; }
    .count-bar { flex: 1; height: 3px; background: #e9eaec; border-radius: 2px; overflow: hidden; }
    .count-fill { height: 100%; border-radius: 2px; transition: width 0.2s, background-color 0.2s; }
    .count-label { font-size: 0.68rem; font-weight: 500; min-width: 52px; text-align: right; transition: color 0.2s; }

    .c-ok   { color: var(--ok); }    .c-warn { color: var(--warn); }    .c-over { color: var(--danger); font-weight: 600; }
    .f-ok   { background: var(--ok); } .f-warn { background: var(--warn); } .f-over { background: var(--danger); }

    .placeholder { text-align: center; padding: 72px 20px; color: #d1d5db; }
    .placeholder-icon { font-size: 2.8rem; margin-bottom: 12px; }
    .placeholder h3 { font-size: 0.95rem; color: #9ca3af; margin-bottom: 4px; font-weight: 500; }
    .placeholder p  { font-size: 0.8rem; }
  </style>
</head>
<body>

<header class="header">
  <h1>🚀 ASO Metadata Generator</h1>
  <p>Generate App Store &amp; Google Play metadata from your app description</p>
</header>

<main class="main">
  <div class="grid">

    <!-- Input -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">⚙ Configuration</div>
      </div>

      <div class="form-group">
        <label>App Category</label>
        <select class="form-control" id="category">
          <option value="utilities">Utilities</option>
          <option value="health">Health &amp; Fitness</option>
          <option value="finance">Finance</option>
          <option value="travel">Travel</option>
          <option value="productivity">Productivity</option>
        </select>
      </div>

      <div class="form-group">
        <label>Target Language</label>
        <select class="form-control" id="language">
          <option value="English">English</option>
          <option value="German">German</option>
          <option value="Portuguese">Portuguese</option>
          <option value="Arabic">Arabic</option>
        </select>
      </div>

      <div class="form-group">
        <label>App Description (2–3 sentences)</label>
        <textarea class="form-control" id="description"
          placeholder="Describe what your app does…&#10;&#10;e.g. BudgetPal is a smart expense tracker that helps you manage finances with ease. It syncs with your bank accounts and shows real-time spending insights. Beautiful charts and AI tips make saving money simple."></textarea>
      </div>

      <button class="btn-primary" id="genBtn" onclick="generate()">
        <span id="btnIcon">✨</span>
        <span id="btnText">Generate Metadata</span>
      </button>

      <div class="error-box" id="errorBox"></div>
    </div>

    <!-- Output -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">📋 Generated Metadata</div>
        <div class="variant-tabs" id="variantTabs" style="display:none"></div>
      </div>
      <div id="outputArea">
        <div class="placeholder">
          <div class="placeholder-icon">📄</div>
          <h3>No metadata yet</h3>
          <p>Fill in the form and click Generate</p>
        </div>
      </div>
    </div>

  </div>
</main>

// ── Safety: trim to char limit at word/comma boundaries ──────────────────────
function truncWords(s, max) {
  if (!s || s.length <= max) return s;
  const cut = s.slice(0, max);
  const sp  = cut.lastIndexOf(' ');
  return (sp > max - 10 ? cut.slice(0, sp) : cut).replace(/[,\s]+$/, '');
}
function truncKw(s, max = 100) {
  if (!s || s.length <= max) return s;
  const cut = s.slice(0, max);
  const c   = cut.lastIndexOf(',');
  return c > 0 ? cut.slice(0, c) : cut.slice(0, max);
}

// ── Core generation ───────────────────────────────────────────────────────────
function detectFeature(desc, category) {
  const patterns = FEAT_PATTERNS[category] || [];
  for (const { key, re } of patterns) {
    if (re.test(desc)) return key;
  }
  return '_default';
}

function getWord(category, key, lang) {
  const map = FEAT_WORDS[category] || {};
  const entry = map[key] || map['_default'] || {};
  return entry[lang] || entry['English'] || '';
}

function applyW(s, w) {
  return s.replace(/\{W\}/g, w);
}

function buildVariant(tmpl, w) {
  return {
    appstore_title:               truncWords(applyW(tmpl.asTitle,  w), 30),
    appstore_subtitle:            truncWords(applyW(tmpl.asSub,    w), 30),
    appstore_keywords:            truncKw(              tmpl.asKw,     100),
    googleplay_title:             truncWords(applyW(tmpl.gpTitle || tmpl.asTitle, w), 30),
    googleplay_short_description: truncWords(applyW(tmpl.gpDesc,   w), 80),
  };
}

function generateVariants(category, language, description) {
  const langKey = language || 'English';
  const catData = TEMPLATES[category] || TEMPLATES.utilities;
  const langData = catData[langKey] || catData['English'];

  const featKey = detectFeature(description, category);
  const w = getWord(category, featKey, langKey);

  return langData.map(tmpl => buildVariant(tmpl, w));
}

// ── UI State ──────────────────────────────────────────────────────────────────
let variants  = [];
let activeTab = 0;

function generate() {
  const category    = document.getElementById('category').value;
  const language    = document.getElementById('language').value;
  const description = document.getElementById('description').value.trim();

  hideError();
  if (!description || description.length < 20) {
    return showError('Please enter a short description of your app (2–3 sentences).');
  }

  setLoading(true);
  setTimeout(() => {
    try {
      variants  = generateVariants(category, language, description);
      activeTab = 0;
      renderTabs();
      renderVariant();
    } catch (e) {
      showError('Something went wrong. Please try again.');
    } finally {
      setLoading(false);
    }
  }, 420);
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderTabs() {
  const el = document.getElementById('variantTabs');
  el.style.display = 'flex';
  el.innerHTML = variants.map((_, i) =>
    `<button class="tab${i === activeTab ? ' active' : ''}" onclick="switchTab(${i})">Variant ${i + 1}</button>`
  ).join('');
}

function switchTab(i) {
  activeTab = i;
  renderTabs();
  renderVariant();
}

function renderVariant() {
  const v   = variants[activeTab];
  const rtl = document.getElementById('language').value === 'Arabic';
  document.getElementById('outputArea').innerHTML = `
    <div class="platform-grid">
      <div class="platform-panel">
        <div class="platform-header">${svgApple()} App Store</div>
        ${field('as_t', 'Title',    v.appstore_title,    30, false, rtl)}
        ${field('as_s', 'Subtitle', v.appstore_subtitle, 30, false, rtl)}
        ${field('as_k', 'Keywords', v.appstore_keywords, 100, true, rtl)}
      </div>
      <div class="platform-panel">
        <div class="platform-header">${svgAndroid()} Google Play</div>
        ${field('gp_t', 'Title',             v.googleplay_title,             30, false, rtl)}
        ${field('gp_s', 'Short Description', v.googleplay_short_description, 80, true,  rtl)}
      </div>
    </div>`;
}

function field(id, label, value, limit, multi, rtl) {
  value = value || '';
  const safe  = esc(value);
  const count = value.length;
  const { cc, fc } = cls(count, limit);
  const pct   = (Math.min(count / limit, 1) * 100).toFixed(1);
  const over  = count > limit ? ' over' : '';
  const dir   = rtl ? ' dir="rtl"' : '';

  const inp = multi
    ? `<textarea class="field-input${over}" id="${id}" rows="2" oninput="upd(this,${limit},'${id}_f','${id}_l')"${dir}>${safe}</textarea>`
    : `<input type="text" class="field-input${over}" id="${id}" value="${safe}" oninput="upd(this,${limit},'${id}_f','${id}_l')"${dir} />`;

  return `<div class="field">
    <div class="field-meta">
      <span class="field-label">${label}</span>
      <button class="copy-btn" onclick="cp('${id}',this)">${svgCopy()} Copy</button>
    </div>
    ${inp}
    <div class="count-row">
      <div class="count-bar"><div class="count-fill ${fc}" id="${id}_f" style="width:${pct}%"></div></div>
      <span class="count-label ${cc}" id="${id}_l">${count} / ${limit}</span>
    </div>
  </div>`;
}

function upd(el, limit, fId, lId) {
  const count = el.value.length;
  const { cc, fc } = cls(count, limit);
  const pct = (Math.min(count / limit, 1) * 100).toFixed(1);
  el.classList.toggle('over', count > limit);
  const f = document.getElementById(fId); f.style.width = pct + '%'; f.className = `count-fill ${fc}`;
  const l = document.getElementById(lId); l.textContent = `${count} / ${limit}`; l.className = `count-label ${cc}`;
}

function cls(count, limit) {
  const r = count / limit;
  if (r > 1)    return { cc: 'c-over', fc: 'f-over' };
  if (r > 0.85) return { cc: 'c-warn', fc: 'f-warn' };
  return              { cc: 'c-ok',   fc: 'f-ok'   };
}

function cp(id, btn) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.value).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `${svgCheck()} Copied`;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = `${svgCopy()} Copy`; }, 2000);
  }).catch(() => {
    const ta = Object.assign(document.createElement('textarea'), { value: el.value, style: 'position:fixed;opacity:0' });
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  });
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setLoading(on) {
  const btn = document.getElementById('genBtn');
  btn.disabled = on;
  document.getElementById('btnIcon').innerHTML = on ? '<div class="spin"></div>' : '✨';
  document.getElementById('btnText').textContent = on ? 'Generating…' : 'Generate Metadata';
  if (on) {
    document.getElementById('outputArea').innerHTML = `<div class="placeholder"><div class="placeholder-icon">⚙️</div><h3>Building your metadata…</h3><p>Analysing description and applying templates</p></div>`;
    document.getElementById('variantTabs').style.display = 'none';
  }
}
function showError(m) { const e = document.getElementById('errorBox'); e.textContent = m; e.style.display = 'block'; }
function hideError()   { document.getElementById('errorBox').style.display = 'none'; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
